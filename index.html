<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⭐ 星星扫雷 · Star Sweeper</title>
  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="星星扫雷">
  <meta name="theme-color" content="#f59e0b">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --tile-size:50px;
      --purple-light:#C4B4F0;--purple-mid:#A594D8;--purple-dark:#7B6BAF;
      --n1:#3B82F6;--n2:#16A34A;--n3:#DC2626;--n4:#7C3AED;
      --n5:#EA580C;--n6:#0891B2;--n7:#BE185D;--n8:#374151;
      --panel:rgba(255,255,255,0.92);--shadow:0 4px 20px rgba(80,60,160,0.18);
    }
    body{
      font-family:'Nunito',sans-serif;
      background:linear-gradient(180deg,#1A6FB5 0%,#2E8FD9 15%,#5BB5EF 38%,#84CFFA 62%,#B6E4FF 82%,#D8F0FF 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;position:relative;
      /* iPad safe areas (notch / home indicator) */
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }

    /* ── Particles ── */
    .particle{position:fixed;pointer-events:none;animation:particleFloat linear infinite;opacity:0;}
    @keyframes particleFloat{
      0%{transform:translateY(100vh) rotate(0);opacity:0}
      10%{opacity:.8}90%{opacity:.5}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
    }

    /* ── Clouds ── */
    .cloud{position:fixed;pointer-events:none;animation:cloudDrift linear infinite;}
    .cloud svg{filter:drop-shadow(0 4px 8px rgba(0,0,0,0.06));}
    @keyframes cloudDrift{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}

    /* ── Balloon ── */
    .balloon{position:fixed;top:5%;right:7%;pointer-events:none;animation:balloonFloat 6s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.14));}
    @keyframes balloonFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-20px) rotate(2deg)}}

    /* ── Flowers ── */
    .flowers{position:fixed;bottom:0;left:0;width:100%;pointer-events:none;z-index:0;}

    /* ── Game wrap ── */
    .game-wrap{
      width:min(1020px,98vw);background:rgba(255,255,255,0.14);
      border-radius:36px;padding:13px;
      border:3px solid rgba(255,255,255,0.6);backdrop-filter:blur(8px);
      box-shadow:0 16px 56px rgba(40,20,100,0.32);position:relative;z-index:1;
    }

    /* ── Top bar ── */
    .top-bar{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
    .btn-icon{
      height:42px;border-radius:14px;background:var(--panel);
      border:2px solid rgba(255,255,255,0.95);box-shadow:var(--shadow);
      font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:transform .15s;padding:0 10px;font-family:'Fredoka One',cursive;color:#3D2F7A;gap:5px;
    }
    .btn-icon:hover{transform:scale(1.08);}
    .stat-panel{
      background:var(--panel);border:2.5px solid rgba(255,255,255,0.95);border-radius:16px;
      padding:5px 12px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.8);
      display:flex;align-items:center;gap:7px;flex:1;min-width:76px;
    }
    .stat-panel .lbl{font-family:'Fredoka One',cursive;font-size:9px;color:#A090C8;letter-spacing:1.2px;text-transform:uppercase}
    .stat-panel .val{font-family:'Fredoka One',cursive;font-size:20px;color:#2D1F6A;letter-spacing:.5px}
    .stat-icon{font-size:20px}
    .level-select{font-family:'Fredoka One',cursive;font-size:17px;color:#2D1F6A;background:none;border:none;outline:none;cursor:pointer}

    /* Lives display */
    .lives-stat{flex:0;min-width:unset;}
    .lives-val{font-size:16px;letter-spacing:2px;line-height:1.4}
    .heart-icon{display:inline-block;transition:transform .2s;}
    .heart-icon.break{animation:heartBreak .5s ease-in-out forwards;}
    @keyframes heartBreak{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.8) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}

    .audio-btns{display:flex;gap:5px;margin-left:auto}
    .audio-btn{
      width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
      font-size:17px;display:flex;align-items:center;justify-content:center;
      box-shadow:var(--shadow);transition:transform .15s;
    }
    .audio-btn:hover{transform:scale(1.18)}
    .btn-music{background:linear-gradient(135deg,#E879F9,#A855F7)}
    .btn-sound{background:linear-gradient(135deg,#FCD34D,#F59E0B)}
    .audio-btn.muted{opacity:.45}

    /* ── Best bar ── */
    .best-bar{display:flex;gap:7px;justify-content:center;margin-bottom:9px;flex-wrap:wrap;}
    .best-chip{
      background:var(--panel);border:2px solid #E0D0FF;border-radius:50px;padding:2px 12px;
      font-family:'Fredoka One',cursive;font-size:11px;color:#7C3AED;
      box-shadow:var(--shadow);display:flex;align-items:center;gap:5px;
    }
    .best-chip .bc-lbl{color:#B0A0D0;font-size:10px}

    /* ── Main layout ── */
    .main-area{display:flex;gap:10px;align-items:flex-start;}

    /* ── Left panel ── */
    .left-panel{width:144px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:9px;}
    .speech-bubble{
      background:white;border-radius:20px;padding:9px 11px;
      box-shadow:0 6px 20px rgba(100,60,200,0.2);border:2.5px solid #E8DEFF;
      position:relative;text-align:center;
      font-size:11px;font-weight:900;color:#7C3AED;line-height:1.45;
      min-height:56px;display:flex;align-items:center;justify-content:center;width:100%;
    }
    .speech-bubble::after{
      content:'';position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);
      border:8px solid transparent;border-top-color:white;
      filter:drop-shadow(0 3px 2px rgba(100,60,200,0.1));
    }
    .mascot-wrap{position:relative;display:flex;align-items:center;justify-content:center;animation:catBob 2.2s ease-in-out infinite;}
    @keyframes catBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
    .mascot-sparkle{position:absolute;font-size:13px;animation:sparklePop 2s ease-in-out infinite;}
    .mascot-sparkle.s1{top:-6px;left:-2px;animation-delay:.3s}
    .mascot-sparkle.s2{top:4px;right:-7px;animation-delay:.9s}
    .mascot-sparkle.s3{bottom:4px;left:-9px;animation-delay:1.5s}
    @keyframes sparklePop{0%,100%{transform:scale(.7) rotate(0);opacity:.5}50%{transform:scale(1.3) rotate(20deg);opacity:1}}
    .goal-panel{
      background:var(--panel);border:2.5px solid #E0D0FF;border-radius:16px;
      padding:9px 11px;box-shadow:var(--shadow);width:100%;text-align:center;
    }
    .goal-title{font-family:'Fredoka One',cursive;font-size:12px;color:white;background:linear-gradient(135deg,#A78BFA,#7C3AED);border-radius:8px;padding:2px 8px;display:inline-block;margin-bottom:5px;}
    .goal-text{font-size:11px;font-weight:800;color:#5B4A8A;margin-bottom:7px;line-height:1.4}
    .goal-stars{display:flex;gap:3px;justify-content:center;}
    .goal-star{font-size:20px;transition:all .35s;filter:drop-shadow(0 2px 4px rgba(250,200,0,0.5))}
    .goal-star.dim{filter:grayscale(1) opacity(.35)}

    /* ── Grid area ── */
    .grid-wrap{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}

    /* Combo badge */
    .combo-badge{
      position:absolute;top:-40px;left:50%;transform:translateX(-50%) scale(0);
      background:linear-gradient(135deg,#F97316,#DC2626);
      color:white;border-radius:50px;padding:6px 18px;
      font-family:'Fredoka One',cursive;font-size:18px;
      box-shadow:0 4px 16px rgba(249,115,22,.5);
      transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;
      white-space:nowrap;pointer-events:none;
      z-index:10;opacity:0;
    }
    .combo-badge.show{transform:translateX(-50%) scale(1);opacity:1;}

    .game-grid{
      display:grid;gap:5px;padding:14px;
      background:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(200,180,255,0.2));
      border-radius:26px;border:3px solid rgba(255,255,255,0.7);
      box-shadow:inset 0 4px 20px rgba(100,70,200,0.18),0 8px 32px rgba(50,20,120,0.22),0 2px 0 rgba(255,255,255,0.5);
      position:relative;
    }
    @keyframes gridShake{
      0%,100%{transform:translateX(0)}
      15%{transform:translateX(-8px) rotate(-1deg)}
      30%{transform:translateX(8px) rotate(1deg)}
      45%{transform:translateX(-6px)}60%{transform:translateX(6px)}
      75%{transform:translateX(-3px)}
    }
    .game-grid.shake{animation:gridShake .45s ease-in-out;}

    /* Float score */
    .float-score{
      position:absolute;font-family:'Fredoka One',cursive;
      font-size:16px;color:#7C3AED;pointer-events:none;
      animation:floatUp .9s ease-out forwards;z-index:20;
      text-shadow:0 2px 6px rgba(0,0,0,.15);white-space:nowrap;
    }
    @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-44px) scale(.8);opacity:0}}

    /* ── Tiles ── */
    .tile{
      width:var(--tile-size);height:var(--tile-size);border-radius:11px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;font-size:20px;
      user-select:none;position:relative;transition:transform .1s,box-shadow .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .tile:active{transform:scale(.91)!important}
    .tile.hidden{
      background:linear-gradient(145deg,#C8B8FF,#9B77E8);
      box-shadow:0 5px 0 #5E3FB3,inset 0 2px 0 rgba(255,255,255,0.55),inset 0 -1px 0 rgba(0,0,0,.08),0 3px 12px rgba(80,50,180,.3);
    }
    .tile.hidden:hover{
      background:linear-gradient(145deg,#D8CCFF,#B49DF5);transform:translateY(-3px);
      box-shadow:0 8px 0 #5E3FB3,inset 0 2px 0 rgba(255,255,255,.6),0 8px 18px rgba(80,50,180,.38);
    }
    .tile.hidden::before{content:'✦';font-size:16px;color:rgba(255,255,255,.32);pointer-events:none;text-shadow:0 0 8px rgba(200,180,255,.7);}
    .tile.flagged{background:linear-gradient(145deg,#C8B8FF,#9B77E8);box-shadow:0 5px 0 #5E3FB3,inset 0 2px 0 rgba(255,255,255,.5);}
    .tile.flagged::before{content:none}
    .tile.pressing{animation:pressRipple .5s ease-out forwards}
    @keyframes pressRipple{0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}100%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
    .tile.revealed{background:linear-gradient(140deg,#FAFBFF,#EEE8FF);box-shadow:inset 0 2px 8px rgba(100,70,200,.14),0 1px 0 rgba(255,255,255,.9),0 0 0 1.5px #CEC4F0;cursor:default;}
    .tile.revealed:hover{transform:none}
    .tile.n1{color:var(--n1);text-shadow:0 1px 6px rgba(59,130,246,.45)}
    .tile.n2{color:var(--n2);text-shadow:0 1px 6px rgba(22,163,74,.45)}
    .tile.n3{color:var(--n3);text-shadow:0 1px 6px rgba(220,38,38,.45)}
    .tile.n4{color:var(--n4);text-shadow:0 1px 6px rgba(124,58,237,.45)}
    .tile.n5{color:var(--n5);text-shadow:0 1px 6px rgba(234,88,12,.45)}
    .tile.n6{color:var(--n6);text-shadow:0 1px 6px rgba(8,145,178,.45)}
    .tile.n7{color:var(--n7);text-shadow:0 1px 6px rgba(190,24,93,.4)}
    .tile.n8{color:var(--n8);text-shadow:0 1px 4px rgba(55,65,81,.35)}
    .tile.mine-hit{background:linear-gradient(135deg,#FEE2E2,#FECACA);box-shadow:0 0 0 2.5px #F87171,0 0 20px rgba(248,113,113,.4);animation:shakeTile .45s ease-in-out;}
    .tile.mine-show{background:linear-gradient(135deg,#FFF1F0,#FFE4E1);box-shadow:0 0 0 1.5px #FCA5A5;}
    @keyframes shakeTile{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-3deg)}40%{transform:translateX(6px) rotate(3deg)}60%{transform:translateX(-4px) rotate(-2deg)}80%{transform:translateX(4px) rotate(2deg)}}
    @keyframes tileReveal{0%{transform:scale(.65) rotateY(90deg);opacity:.4}65%{transform:scale(1.1) rotateY(-8deg)}100%{transform:scale(1) rotateY(0);opacity:1}}
    .tile.reveal-anim{animation:tileReveal .28s cubic-bezier(.34,1.56,.64,1) forwards}
    .tile.peeking{outline:3px solid #22D3EE;outline-offset:2px;animation:peekPulse .7s ease-in-out infinite;}
    @keyframes peekPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,211,238,.6)}50%{box-shadow:0 0 0 10px rgba(34,211,238,0)}}

    /* ── Right panel ── */
    .right-panel{width:108px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;padding-top:2px;}
    .powerup-btn{
      border:none;border-radius:20px;padding:11px 8px 13px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      font-family:'Fredoka One',cursive;font-size:12px;color:white;position:relative;
      box-shadow:0 6px 0 rgba(0,0,0,.22),0 8px 20px rgba(0,0,0,.16);
      transition:transform .12s,box-shadow .12s;text-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .powerup-btn:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 10px 0 rgba(0,0,0,.2),0 14px 24px rgba(0,0,0,.18);}
    .powerup-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 4px 0 rgba(0,0,0,.2)}
    .powerup-btn:disabled{opacity:.42;cursor:not-allowed}
    .powerup-btn .pu-icon{font-size:28px;line-height:1}
    .powerup-btn .pu-label{font-size:11px;letter-spacing:.5px}
    .powerup-btn .pu-count{position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;border:2.5px solid white;font-family:'Fredoka One',cursive;box-shadow:0 2px 8px rgba(0,0,0,.22);color:white;}
    .btn-hint{background:linear-gradient(155deg,#FDE68A,#F59E0B,#D97706)}.btn-hint .pu-count{background:#B45309}
    .btn-peek{background:linear-gradient(155deg,#86EFAC,#22C55E,#16A34A)}.btn-peek .pu-count{background:#15803D}
    .btn-safedig{background:linear-gradient(155deg,#BAE6FD,#38BDF8,#0284C7)}.btn-safedig .pu-count{background:#0369A1}

    /* ── Bottom bar ── */
    .bottom-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:11px;}
    .flags-display{background:var(--panel);border:2.5px solid rgba(255,255,255,.95);border-radius:50px;padding:9px 16px;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);font-family:'Fredoka One',cursive;font-size:16px;color:#2D1F6A;}
    .btn-play{background:linear-gradient(155deg,#86EFAC,#22C55E,#16A34A);border:none;border-radius:50px;padding:13px 44px;color:white;font-family:'Fredoka One',cursive;font-size:20px;cursor:pointer;box-shadow:0 6px 0 #15803D,0 8px 24px rgba(22,163,74,.4);transition:transform .12s,box-shadow .12s;display:flex;align-items:center;gap:9px;letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.2);}
    .btn-play:hover{transform:translateY(-4px);box-shadow:0 10px 0 #15803D,0 14px 28px rgba(22,163,74,.45)}
    .btn-play:active{transform:translateY(2px);box-shadow:0 4px 0 #15803D}
    .btn-reset{background:linear-gradient(155deg,#FDE68A,#FCD34D,#F59E0B);border:none;border-radius:50px;padding:13px 20px;color:white;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;box-shadow:0 6px 0 #B45309,0 8px 18px rgba(180,83,9,.35);transition:transform .12s,box-shadow .12s;display:flex;align-items:center;gap:7px;text-shadow:0 1px 2px rgba(0,0,0,.15);}
    .btn-reset:hover{transform:translateY(-4px);box-shadow:0 10px 0 #B45309}
    .btn-reset:active{transform:translateY(2px);box-shadow:0 4px 0 #B45309}

    /* ── Turtle ── */
    .turtle-corner{position:relative;height:0}
    .turtle-wrap{position:absolute;bottom:-10px;right:-14px;animation:turtleWave 3.2s ease-in-out infinite;}
    @keyframes turtleWave{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-8px)}}
    .turtle-bubble{position:absolute;bottom:100px;right:10px;background:white;border-radius:14px;padding:6px 11px;font-size:11px;font-weight:900;color:#16A34A;white-space:nowrap;box-shadow:var(--shadow);border:2px solid #DCFCE7;}
    .turtle-bubble::after{content:'';position:absolute;bottom:-11px;right:20px;border:7px solid transparent;border-top-color:white;}

    /* ── Achievement popup ── */
    .achievement-pop{
      position:fixed;top:80px;right:-320px;
      background:linear-gradient(135deg,#7C3AED,#C084FC);
      color:white;border-radius:22px;padding:13px 18px;
      display:flex;align-items:center;gap:12px;
      box-shadow:0 8px 28px rgba(124,58,237,.45);
      transition:right .4s cubic-bezier(.34,1.56,.64,1);
      z-index:150;max-width:290px;
    }
    .achievement-pop.show{right:20px;}
    .ach-emoji{font-size:32px;flex-shrink:0;}
    .ach-badge-lbl{font-family:'Fredoka One',cursive;font-size:11px;opacity:.75;margin-bottom:2px;}
    .ach-name{font-family:'Fredoka One',cursive;font-size:17px;}

    /* ── Overlay ── */
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(20,10,60,.65);backdrop-filter:blur(10px);z-index:100;opacity:0;pointer-events:none;transition:opacity .4s;}
    .overlay.show{opacity:1;pointer-events:all}
    .overlay-card{background:white;border-radius:36px;padding:38px 50px;text-align:center;box-shadow:0 28px 72px rgba(20,10,60,.45);transform:scale(.78);transition:transform .45s cubic-bezier(.34,1.56,.64,1);min-width:300px;}
    .overlay.show .overlay-card{transform:scale(1)}
    .overlay-emoji{font-size:78px;margin-bottom:13px;display:block}
    .overlay-title{font-family:'Fredoka One',cursive;font-size:40px;margin-bottom:8px}
    .overlay-sub{font-size:14px;font-weight:700;color:#6B6A9A;margin-bottom:18px}
    .overlay-stars{font-size:34px;margin-bottom:14px;letter-spacing:4px}
    .overlay-score{font-family:'Fredoka One',cursive;font-size:26px;color:#7C3AED;margin-bottom:5px}
    .overlay-best{font-size:12px;font-weight:700;color:#A090C8;margin-bottom:20px}
    .overlay-btn{background:linear-gradient(155deg,#C084FC,#A855F7,#7C3AED);color:white;border:none;border-radius:50px;padding:13px 38px;font-family:'Fredoka One',cursive;font-size:21px;cursor:pointer;box-shadow:0 6px 0 #5B21B6,0 8px 24px rgba(124,58,237,.45);transition:transform .12s;}
    .overlay-btn:hover{transform:translateY(-3px)}

    /* ── Toast ── */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:white;border-radius:18px;padding:9px 22px;font-family:'Fredoka One',cursive;font-size:16px;color:#3D2F7A;box-shadow:0 8px 28px rgba(60,40,120,.28);border:2.5px solid #EDE5FF;transition:transform .32s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0)}

    .confetti-piece{position:fixed;border-radius:2px;pointer-events:none;animation:confettiFall 3s ease-in forwards;z-index:999;}
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

    /* ── Responsive ── */
    @media(max-width:720px){:root{--tile-size:36px}.tile{font-size:14px;border-radius:7px}.game-grid{gap:3px;padding:10px}.left-panel{width:100px}.mascot-wrap svg{width:84px}.right-panel{width:80px}.powerup-btn .pu-icon{font-size:20px}}
    @media(max-width:500px){:root{--tile-size:30px}.left-panel,.right-panel{display:none}.game-grid{gap:3px;padding:8px}}

    /* ── Map Screen ── */
    .map-screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .map-title{font-family:'Fredoka One',cursive;font-size:38px;color:white;text-shadow:0 3px 14px rgba(0,0,0,0.32);margin-bottom:6px;letter-spacing:1px;}
    .map-sub{font-size:14px;font-weight:800;color:rgba(255,255,255,0.82);margin-bottom:26px;}
    .map-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:900px;}
    .level-card{background:linear-gradient(160deg,rgba(255,255,255,0.26),rgba(255,255,255,0.10));border:2px solid rgba(255,255,255,0.55);border-radius:28px;padding:18px 14px 16px;width:155px;text-align:center;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(40,20,100,0.3),inset 0 1px 0 rgba(255,255,255,0.4);transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;position:relative;overflow:hidden;cursor:pointer;}
    .level-card:not(.locked):hover{transform:translateY(-8px) scale(1.06);box-shadow:0 22px 48px rgba(40,20,100,0.48),inset 0 1px 0 rgba(255,255,255,.5);}
    .level-card.locked{filter:saturate(0.2) brightness(0.8);cursor:not-allowed;}
    .level-card-scene{width:100px;height:100px;border-radius:50%;margin:0 auto 12px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.25),0 0 0 3px rgba(255,255,255,0.35);}
    .level-card-scene svg{width:100px;height:100px;}
    .level-card-name{font-family:'Fredoka One',cursive;font-size:16px;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.3);margin-bottom:3px;}
    .level-card-diff{font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);margin-bottom:7px;}
    .level-card-stars{font-size:14px;letter-spacing:1px;min-height:18px;color:white;}
    .level-card-lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.42);border-radius:25px;font-size:38px;}
    @keyframes cardUnlock{0%{filter:saturate(0.25) brightness(0.85)}100%{filter:saturate(1) brightness(1)}}
    .level-card.just-unlocked{animation:cardUnlock .7s .1s ease forwards;}
    .level-card.just-unlocked .level-card-lock{animation:unlockPop .6s ease forwards;opacity:0;}
    @keyframes unlockPop{0%{transform:scale(1.2);opacity:1}100%{transform:scale(0.4);opacity:0}}

    /* ── Map action buttons ── */
    .map-action-btns{display:flex;gap:12px;margin-bottom:18px;justify-content:center;}
    .map-action-btn{font-family:'Fredoka One',cursive;font-size:16px;padding:10px 22px;border-radius:22px;border:2.5px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.22);color:white;cursor:pointer;backdrop-filter:blur(10px);box-shadow:0 4px 18px rgba(40,20,100,0.25);transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;text-shadow:0 2px 6px rgba(0,0,0,0.22);}
    .map-action-btn:hover{transform:translateY(-4px) scale(1.07);box-shadow:0 10px 28px rgba(40,20,100,0.38);}
    .map-daily-btn{border-color:rgba(255,220,80,0.7);background:rgba(255,200,40,0.25);}
    .map-stats-btn{border-color:rgba(140,200,255,0.7);background:rgba(80,160,255,0.2);}
    .map-help-btn{border-color:rgba(180,255,180,0.7);background:rgba(80,220,120,0.2);}
    /* ── Help / Tutorial Modal ── */
    .help-steps{text-align:left;margin:10px 0 4px;max-height:52vh;overflow-y:auto;padding-right:4px;}
    .help-steps::-webkit-scrollbar{width:4px}.help-steps::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:4px}
    .help-step{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;margin-bottom:8px;background:linear-gradient(135deg,rgba(124,58,237,0.07),rgba(59,130,246,0.06));border-radius:16px;border:1.5px solid rgba(124,58,237,0.1);}
    .help-step-icon{font-size:22px;flex-shrink:0;margin-top:1px;letter-spacing:-3px;}
    .help-step-title{font-family:'Fredoka One',cursive;font-size:15px;color:#3D2F7A;margin-bottom:3px;}
    .help-step-desc{font-size:13px;color:#5B5082;line-height:1.55;}
    /* ── Modal overlay ── */
    .modal-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(10,5,40,0.55);backdrop-filter:blur(4px);}
    .modal-overlay.show{display:flex;}
    .modal-card{background:linear-gradient(160deg,rgba(255,255,255,0.96),rgba(240,235,255,0.98));border-radius:32px;padding:32px 28px 24px;max-width:420px;width:90%;box-shadow:0 24px 64px rgba(40,20,100,0.42);border:2.5px solid rgba(255,255,255,0.9);text-align:center;}
    .modal-title{font-family:'Fredoka One',cursive;font-size:26px;color:#3D2F7A;margin-bottom:10px;}
    .modal-sub{font-size:14px;font-weight:700;color:#7B6BAF;margin-bottom:18px;}
    .modal-close-btn{font-family:'Fredoka One',cursive;font-size:17px;padding:11px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#A78BFA,#7C3AED);color:white;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,0.35);transition:transform .15s;margin-top:16px;display:inline-block;}
    .modal-close-btn:hover{transform:scale(1.05);}
    .modal-close-btn--ghost{background:rgba(124,58,237,0.1);color:#7C3AED;box-shadow:none;border:2px solid rgba(124,58,237,0.3);}
    /* ── Stats grid ── */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
    .stat-box{background:rgba(124,58,237,0.08);border-radius:16px;padding:14px 10px;border:1.5px solid rgba(124,58,237,0.15);}
    .stat-box-val{font-family:'Fredoka One',cursive;font-size:28px;color:#3D2F7A;}
    .stat-box-lbl{font-size:11px;font-weight:800;color:#A090C8;letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
    .stats-best-times{grid-column:1/-1;background:rgba(124,58,237,0.06);border-radius:16px;padding:14px;border:1.5px solid rgba(124,58,237,0.12);text-align:left;}
    .stats-best-label{font-family:'Fredoka One',cursive;font-size:14px;color:#5B4BA0;margin-bottom:8px;}
    .stats-best-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#6B5B9A;padding:3px 0;border-bottom:1px solid rgba(124,58,237,0.08);}
    /* ── Daily done badge ── */
    .daily-done-badge{font-size:48px;margin:10px 0;}
    .daily-done-text{font-family:'Fredoka One',cursive;font-size:18px;color:#3D2F7A;margin-bottom:6px;}
    .daily-streak{font-size:13px;font-weight:700;color:#A090C8;}
    /* ── Special Tiles ── */
    @keyframes glowGold{0%,100%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 4px 0 rgba(255,215,0,.25)}50%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 14px 5px rgba(255,215,0,.6)}}
    @keyframes glowBlue{0%,100%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 4px 0 rgba(56,189,248,.25)}50%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 14px 5px rgba(56,189,248,.6)}}
    @keyframes glowPurple{0%,100%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 4px 0 rgba(167,139,250,.25)}50%{box-shadow:0 5px 0 #7060B8,inset 0 1px 0 rgba(255,255,255,.45),0 2px 10px rgba(80,50,180,.25),0 0 14px 5px rgba(167,139,250,.6)}}
    .tile.hidden.sp-star{animation:glowGold 2s ease-in-out infinite;}
    .tile.hidden.sp-chest{animation:glowBlue 2.2s ease-in-out infinite;}
    .tile.hidden.sp-boost{animation:glowPurple 1.8s ease-in-out infinite;}
    @keyframes specialReveal{0%{transform:scale(1)}40%{transform:scale(1.28)}70%{transform:scale(0.92)}100%{transform:scale(1)}}
    .tile.special-pop{animation:specialReveal .38s cubic-bezier(.34,1.56,.64,1);}
    .special-icon-overlay{position:absolute;pointer-events:none;z-index:30;font-size:32px;animation:specialIconFloat 1s ease-out forwards;}
    @keyframes specialIconFloat{0%{transform:translateY(0) scale(1.2);opacity:1}100%{transform:translateY(-52px) scale(0.6);opacity:0}}
    .timer-boost{position:relative;}.timer-boost::after{content:'⚡';font-size:13px;position:absolute;top:-2px;right:-18px;animation:boostBlink .5s ease-in-out infinite alternate;}
    @keyframes boostBlink{from{opacity:1}to{opacity:.25}}

    /* ── Mascot Moods ── */
    .mascot-wrap.mascot--happy{animation:catHappy .5s ease-in-out infinite alternate;}
    @keyframes catHappy{0%{transform:translateY(-4px) scale(1.05) rotate(-3deg)}100%{transform:translateY(-14px) scale(1.1) rotate(3deg)}}
    .mascot-wrap.mascot--scared{animation:catScared .4s ease-in-out 3;}
    @keyframes catScared{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(7deg)}75%{transform:translateY(-6px) rotate(-7deg)}}
    .mascot-wrap.mascot--cheer{animation:catCheer .32s ease-in-out infinite alternate;}
    @keyframes catCheer{0%{transform:translateY(0) rotate(-6deg)}100%{transform:translateY(-20px) scale(1.12) rotate(6deg)}}
    .mascot-wrap.mascot--cry{animation:catCry 1.6s ease-in-out infinite;}
    @keyframes catCry{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-4px) rotate(1deg)}}
    .mascot-expr{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);font-size:24px;pointer-events:none;z-index:5;animation:exprPop .3s cubic-bezier(.34,1.56,.64,1) both;}
    @keyframes exprPop{from{transform:translateX(-50%) scale(0)}to{transform:translateX(-50%) scale(1)}}
    .cat-star-particle{position:absolute;pointer-events:none;z-index:6;font-size:16px;animation:starParticle .85s ease-out forwards;}
    @keyframes starParticle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0.3);opacity:0}}
    .turtle-wrap.turtle--scared{animation:turtleHide .45s ease-in-out forwards;}
    @keyframes turtleHide{0%{transform:rotate(-4deg) translateY(0)}100%{transform:rotate(0) translateY(22px)}}
    .turtle-wrap.turtle--happy{animation:turtleHappy .4s ease-in-out infinite alternate;}
    @keyframes turtleHappy{0%{transform:rotate(-7deg) translateY(0)}100%{transform:rotate(7deg) translateY(-12px)}}
    .click-phrase{position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap;background:white;border-radius:14px;padding:6px 12px;font-size:12px;font-weight:900;color:#7C3AED;border:2px solid #E8DEFF;box-shadow:0 4px 14px rgba(100,60,200,0.2);pointer-events:none;z-index:10;animation:phraseFloat 2.5s ease-out forwards;}
    .click-phrase::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:white;}
    @keyframes phraseFloat{0%{opacity:0;transform:translateX(-50%) translateY(0)}15%{opacity:1;transform:translateX(-50%) translateY(-8px)}80%{opacity:1;transform:translateX(-50%) translateY(-12px)}100%{opacity:0;transform:translateX(-50%) translateY(-22px)}}
  </style>
</head>

function renderMapScreen(){
  const unlocked=getUnlockedLevel();
  const names={
    zh:['🌲 森林','🏜️ 沙漠','🌊 海洋','⛰️ 雪山','🚀 太空','🌋 火山','🏔️ 极地','🍭 糖果岛','🏛️ 古城','🌈 彩虹岛'],
    en:['🌲 Forest','🏜️ Desert','🌊 Ocean','⛰️ Snow','🚀 Space','🌋 Volcano','🏔️ Arctic','🍭 Candy','🏛️ Ancient','🌈 Rainbow']
  };
  const diffs={
    zh:['入门·6×6','初级·8×8','中级·9×9','高级·10×10','专家·10×10','挑战·11×11','极难·11×11','史诗·12×12','传奇·12×12','神话·13×13'],
    en:['Starter·6×6','Easy·8×8','Medium·9×9','Hard·10×10','Expert·10×10','Chall·11×11','Brutal·11×11','Epic·12×12','Legend·12×12','Myth·13×13']
  };
  const container=document.getElementById('mapCards');if(!container)return;
  container.innerHTML=Array.from({length:10},(_,i)=>i+1).map(lv=>{
    const locked=lv>unlocked;
    const s=getStars(lv);
    const starStr=s>0?'⭐'.repeat(s)+'☆'.repeat(3-s):'☆☆☆';
    return `<div class="level-card${locked?' locked':''}" id="lvcard-${lv}"${locked?'':` onclick="enterLevel(${lv})"`}>`+
      `<div class="level-card-scene">${MAP_SCENES[lv-1]}</div>`+
      `<div class="level-card-name">${names[lang][lv-1]}</div>`+
      `<div class="level-card-diff">${diffs[lang][lv-1]}</div>`+
      `<div class="level-card-stars">${starStr}</div>`+
      (locked?'<div class="level-card-lock">🔒</div>':'')+
      `</div>`;
  }).join('');
}

function showMapScreen(){
  currentScreen='map';
  renderMapScreen();
  document.getElementById('map-screen').style.display='flex';
  document.getElementById('game-wrap').style.display='none';
  if(state._justUnlocked){
    const lv=state._justUnlocked;state._justUnlocked=null;
    setTimeout(()=>{const card=document.getElementById(`lvcard-${lv}`);if(card)card.classList.add('just-unlocked');},300);
  }
}

function showGameScreen(){
  currentScreen='game';
  document.getElementById('map-screen').style.display='none';
  document.getElementById('game-wrap').style.display='';
}

function enterLevel(n){
  state.level=n;state.hints=3;state.peeks=3;state.safeDigs=3;
  showGameScreen();initGame();
  document.getElementById('levelSelect').value=n;
}

function overlayBtnClick(){
  document.getElementById('overlay').classList.remove('show');
  if(state.won){showMapScreen();}else{resetGame();}
}

function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-opt]').forEach(el=>el.textContent=t(el.dataset.i18nOpt));
  document.getElementById('langFlag').textContent=lang==='zh'?'🇬🇧':'🇨🇳';
  document.getElementById('langLabel').textContent=lang==='zh'?'EN':'中文';
  setPlayBtn(state.gameStarted&&!state.gameOver);
  if(!state.gameStarted)setSpeech(pick(t('idle')));
  document.getElementById('turtleBubble').textContent=pick(t('turtle'));
  document.getElementById('overlayBtn').textContent=state.gameOver&&state.won?t('mapBtn'):t('playAgain');
  renderBestBar();
  if(currentScreen==='map')renderMapScreen();
}
function toggleLang(){lang=lang==='zh'?'en':'zh';localStorage.setItem('sweeper-lang',lang);applyLang();}

// ─── Audio ────────────────────────────────────────────────────────────────────
let actx=null,musicOn=localStorage.getItem('sweeper-music')!=='0',soundOn=localStorage.getItem('sweeper-sound')!=='0',bgmInterval=null;
const getACtx=()=>{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;};
function playTone(freq,type,dur,vol=0.16,delay=0){
  if(!soundOn)return;
  const ac=getACtx(),osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain);gain.connect(ac.destination);osc.type=type;
  osc.frequency.setValueAtTime(freq,ac.currentTime+delay);
  gain.gain.setValueAtTime(vol,ac.currentTime+delay);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  osc.start(ac.currentTime+delay);osc.stop(ac.currentTime+delay+dur);
}
const playReveal =()=>playTone(523,'sine',.12,.13);
const playFlag   =()=>{playTone(659,'square',.1,.1);playTone(784,'square',.1,.08,.08);};
const playMine   =()=>{playTone(100,'sawtooth',.5,.26);playTone(80,'sawtooth',.4,.2,.1);};
const playWin    =()=>[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.18,i*.12));
const playHintSnd=()=>{playTone(880,'sine',.2,.15);playTone(1100,'sine',.2,.12,.15);};
const playCombo  =()=>{playTone(784,'sine',.1,.16);playTone(1047,'sine',.12,.18,.1);};
const playLoseLife=()=>playTone(200,'sawtooth',.3,.2);
function startBGM(){
  if(!musicOn||bgmInterval)return;
  const m=[523,587,659,784,659,587,523,0];let i=0;
  bgmInterval=setInterval(()=>{if(!musicOn){clearInterval(bgmInterval);bgmInterval=null;return;}if(m[i]>0)playTone(m[i],'sine',.3,.04);i=(i+1)%m.length;},620);
}
function stopBGM(){clearInterval(bgmInterval);bgmInterval=null;}
function toggleMusic(){musicOn=!musicOn;localStorage.setItem('sweeper-music',musicOn?'1':'0');document.getElementById('btnMusic').classList.toggle('muted',!musicOn);musicOn?startBGM():stopBGM();}
function toggleSound(){soundOn=!soundOn;localStorage.setItem('sweeper-sound',soundOn?'1':'0');document.getElementById('btnSound').classList.toggle('muted',!soundOn);}

const getBest=lv=>parseInt(localStorage.getItem(`best-${lv}`)||'0');
function setBest(lv,score){if(score>getBest(lv)){localStorage.setItem(`best-${lv}`,score);return true;}return false;}
function renderBestBar(){
  const bar=document.getElementById('bestBar');
  const names={zh:['入门','初级','中级','高级','专家','挑战','极难','史诗','传奇','神话'],en:['Starter','Easy','Medium','Hard','Expert','Chall','Brutal','Epic','Legend','Myth']};

}

// ─── Achievements ─────────────────────────────────────────────────────────────
const getUnlocked=()=>new Set(JSON.parse(localStorage.getItem('achievements')||'[]'));
function unlockAch(key){
  const set=getUnlocked();
  if(set.has(key))return;
  set.add(key);localStorage.setItem('achievements',JSON.stringify([...set]));
  const def=I18N[lang].ach[key];if(!def)return;
  document.getElementById('achEmoji').textContent=def.e;
  document.getElementById('achBadgeLbl').textContent=t('achUnlock');
  document.getElementById('achName').textContent=def.n;
  const pop=document.getElementById('achievementPop');
  pop.classList.add('show');
  setTimeout(()=>pop.classList.remove('show'),3200);
}
function checkAchievements(won,stars){
  // Track games played/won
  const played=parseInt(localStorage.getItem('stat-played')||'0')+1;
  localStorage.setItem('stat-played',played);
  if(won){
    const wonCount=parseInt(localStorage.getItem('stat-won')||'0')+1;
    localStorage.setItem('stat-won',wonCount);
    if(wonCount>=20)unlockAch('veteran');
  }
  if(!won)return;
  if(state.elapsed<30)unlockAch('lightning');
  if(state.bestCombo>=6)unlockAch('comboKing');
  if(state.mineHits===0)unlockAch('ironHeart');
  if(stars>=3&&state.level>=3)unlockAch('threeStars');
  // flag pro: count correct flags
  let correctFlags=0;
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)if(state.flagged[r][c]&&state.board[r][c]===-1)correctFlags++;
  if(correctFlags>=5)unlockAch('flagPro');
  // no hints used
  if(state.hints===3&&state.peeks===3&&state.safeDigs===3)unlockAch('noHints');
  // speedster: win level 5+ in under 60s
  if(state.level>=5&&state.elapsed<60)unlockAch('speedster');
  // explorer: all 10 levels completed
  const allDone=Array.from({length:10},(_,i)=>i+1).every(lv=>getStars(lv)>0);
  if(allDone)unlockAch('explorer');
  // collector: collected all 3 special types in one game
  if(state._collectedSpecials&&state._collectedSpecials.has('star')&&state._collectedSpecials.has('chest')&&state._collectedSpecials.has('boost'))unlockAch('collector');
}

// ─── Daily Challenge ────────────────────────────────────────────────────────────
function getDailyKey(){const d=new Date();return `daily-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function isDailyDone(){return !!localStorage.getItem(getDailyKey()+'-done');}
function getDailyStreak(){
  let streak=0,d=new Date();
  while(true){
    const k=`daily-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}-done`;
    if(!localStorage.getItem(k))break;
    streak++;d.setDate(d.getDate()-1);
  }
  return streak;
}
// Seeded RNG (mulberry32)
function seededRNG(seed){
  return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
}
function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}

// ─── Game config ──────────────────────────────────────────────────────────────
const LEVELS={

  2:{size:8, mines:10},   // Easy:     8×8   10 mines
  3:{size:9, mines:15},   // Medium:   9×9   15 mines
  4:{size:10,mines:22},   // Hard:     10×10 22 mines
  5:{size:10,mines:30},   // Expert:   10×10 30 mines
  6:{size:11,mines:28},   // Challenge:11×11 28 mines
  7:{size:11,mines:34},   // Brutal:   11×11 34 mines
  8:{size:12,mines:38},   // Epic:     12×12 38 mines
  9:{size:12,mines:44},   // Legend:   12×12 44 mines
  10:{size:13,mines:50},  // Myth:     13×13 50 mines
};
const MAX_LIVES=3;

let state={
  level:3,size:9,mines:15,board:[],revealed:[],flagged:[],
  gameStarted:false,gameOver:false,won:false,firstClick:true,
  score:0,elapsed:0,timerInterval:null,paused:false,
  hints:3,peeks:3,safeDigs:3,flagsLeft:0,totalSafe:0,revealedSafe:0,
  lives:MAX_LIVES,mineHits:0,
  combo:0,comboTimer:null,bestCombo:0,
  specials:[],boostActive:false,_justUnlocked:null,
};

// ─── Init ─────────────────────────────────────────────────────────────────────
function initGame(){
  const cfg=LEVELS[state.level];
  Object.assign(state,{
    size:cfg.size,mines:cfg.mines,
    board:Array.from({length:cfg.size},()=>Array(cfg.size).fill(0)),
    revealed:Array.from({length:cfg.size},()=>Array(cfg.size).fill(false)),
    flagged:Array.from({length:cfg.size},()=>Array(cfg.size).fill(false)),
    gameStarted:false,gameOver:false,won:false,firstClick:true,
    score:0,elapsed:0,paused:false,
    totalSafe:cfg.size*cfg.size-cfg.mines,revealedSafe:0,flagsLeft:cfg.mines,
    lives:MAX_LIVES,mineHits:0,combo:0,bestCombo:0,
    specials:Array.from({length:cfg.size},()=>Array(cfg.size).fill(null)),
    boostActive:false,_collectedSpecials:new Set(),_dailyMode:false,
  });
  clearInterval(state.timerInterval);clearTimeout(state.comboTimer);
  state.timerInterval=null;state.comboTimer=null;
  resetIdleTimer();
  renderGrid();updateUI();updateLivesUI();updatePowerupUI();setPlayBtn(false);
  setSpeech(pick(t('idle')));updateStars();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('comboBadge').classList.remove('show');
  renderBestBar();
}

function placeMines(er,ec){
  const excl=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const r=er+dr,c=ec+dc;if(r>=0&&r<state.size&&c>=0&&c<state.size)excl.add(r*state.size+c);}
  let placed=0;
  while(placed<state.mines){const r=Math.floor(Math.random()*state.size),c=Math.floor(Math.random()*state.size);if(state.board[r][c]!==-1&&!excl.has(r*state.size+c)){state.board[r][c]=-1;placed++;}}
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)if(state.board[r][c]!==-1)state.board[r][c]=neighborMines(r,c);
  placeSpecials();applySpecialGlow();
}
function neighborMines(r,c){
  let n=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<state.size&&nc>=0&&nc<state.size&&state.board[nr][nc]===-1)n++;}return n;
}

function placeSpecials(){
  const types=['star','chest','boost'];
  const count=state.level<=2?2:3;
  const candidates=[];
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)
    if(state.board[r][c]>0)candidates.push([r,c]);
  for(let i=candidates.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[candidates[i],candidates[j]]=[candidates[j],candidates[i]];}
  candidates.slice(0,count).forEach(([r,c],i)=>{state.specials[r][c]=types[i%types.length];});
}

function applySpecialGlow(){
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++){
    const sp=state.specials[r]&&state.specials[r][c];if(!sp)continue;
    const tile=getTileEl(r,c);if(tile)tile.classList.add(`sp-${sp}`);
  }
}

function triggerSpecial(r,c){
  const sp=state.specials[r]&&state.specials[r][c];if(!sp)return;
  state.specials[r][c]=null;
  // Track for collector achievement
  if(!state._collectedSpecials)state._collectedSpecials=new Set();
  state._collectedSpecials.add(sp);
  const tile=getTileEl(r,c);
  if(tile){tile.classList.remove(`sp-${sp}`);tile.classList.add('special-pop');setTimeout(()=>tile.classList.remove('special-pop'),420);}
  // Floating icon
  const grid=document.getElementById('gameGrid');
  if(tile&&grid){
    const gr=grid.getBoundingClientRect(),tr=tile.getBoundingClientRect();
    const icon=document.createElement('div');icon.className='special-icon-overlay';
    icon.textContent=sp==='star'?'⭐':sp==='chest'?'💎':'⚡';
    icon.style.cssText=`left:${tr.left-gr.left+tr.width/2-20}px;top:${tr.top-gr.top-10}px`;
    grid.appendChild(icon);setTimeout(()=>icon.remove(),1050);
  }
  // Apply effect
  if(sp==='star'){state.score+=50;updateUI();showToast(t('specialStar'));}
  else if(sp==='chest'){state.hints=Math.min(state.hints+1,9);updatePowerupUI();showToast(t('specialChest'));}
  else if(sp==='boost'){activateBoost();}
}

function activateBoost(){
  if(state.boostActive)return;
  state.boostActive=true;
  clearInterval(state.timerInterval);state.timerInterval=null;
  const timerEl=document.getElementById('timerDisplay');
  if(timerEl)timerEl.closest('.stat-panel').classList.add('timer-boost');
  showToast(t('specialBoost'));
  setTimeout(()=>{
    state.boostActive=false;
    const el=document.getElementById('timerDisplay');
    if(el)el.closest('.stat-panel').classList.remove('timer-boost');
    if(!state.gameOver&&!state.paused&&state.gameStarted)startTimer();
  },5000);
}

// ─── Combo ────────────────────────────────────────────────────────────────────
function comboMultiplier(n){if(n>=8)return 3;if(n>=5)return 2;if(n>=3)return 1.5;return 1;}
function triggerCombo(count,r,c){
  clearTimeout(state.comboTimer);
  state.combo++;
  state.bestCombo=Math.max(state.bestCombo,state.combo);
  const mult=comboMultiplier(state.combo);
  const pts=Math.round(count*10);
  const bonus=Math.round(pts*(mult-1));
  if(bonus>0)state.score+=bonus;
  showFloatScore(r,c,pts,mult);
  if(state.combo>=3){
    if(state.combo===3)setMascotMood('happy',2200);
    if(state.combo===6)setMascotMood('cheer');
    playCombo();
    const badge=document.getElementById('comboBadge');
    badge.textContent=t('comboText').replace('{n}',state.combo);
    badge.classList.add('show');
    clearTimeout(state._comboHide);
    state._comboHide=setTimeout(()=>badge.classList.remove('show'),1400);
    if(state.combo===6)setTimeout(()=>unlockAch('comboKing'),200);
  }
  state.comboTimer=setTimeout(()=>{state.combo=0;if(mascotMood==='happy'||mascotMood==='cheer')setMascotMood('default');},2500);
}

// ─── Float score ──────────────────────────────────────────────────────────────
function showFloatScore(r,c,pts,mult){
  const grid=document.getElementById('gameGrid');
  const tile=getTileEl(r,c);if(!tile)return;
  const gr=grid.getBoundingClientRect(),tr=tile.getBoundingClientRect();
  const el=document.createElement('div');el.className='float-score';
  el.textContent=mult>1?`+${pts} ×${mult}`:`+${pts}`;
  el.style.color=mult>=2?'#F97316':mult>=1.5?'#7C3AED':'#16A34A';
  el.style.left=(tr.left-gr.left+tr.width/2-20)+'px';
  el.style.top=(tr.top-gr.top-4)+'px';
  grid.appendChild(el);setTimeout(()=>el.remove(),1000);
}

// ─── Lives UI ─────────────────────────────────────────────────────────────────
function updateLivesUI(){
  const hearts=Array(MAX_LIVES).fill(null).map((_,i)=>i<state.lives?'❤️':'🖤').join('');
  document.getElementById('livesDisplay').innerHTML=hearts;
}

// ─── Reveal ───────────────────────────────────────────────────────────────────
function floodReveal(r,c){
  const queue=[[r,c]],visited=new Set();let count=0;
  while(queue.length){
    const[cr,cc]=queue.shift(),key=cr*100+cc;
    if(visited.has(key))continue;visited.add(key);
    if(cr<0||cr>=state.size||cc<0||cc>=state.size)continue;
    if(state.revealed[cr][cc]||state.flagged[cr][cc])continue;
    state.revealed[cr][cc]=true;
    if(state.board[cr][cc]!==-1){state.revealedSafe++;state.score+=10;count++;
      if(state.specials[cr]&&state.specials[cr][cc])setTimeout(()=>triggerSpecial(cr,cc),220);}
    const tile=getTileEl(cr,cc);
    if(tile){tile.classList.remove('hidden');tile.classList.add('revealed','reveal-anim');setTimeout(()=>tile.classList.remove('reveal-anim'),300);renderTile(tile,cr,cc);}
    if(state.board[cr][cc]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)queue.push([cr+dr,cc+dc]);
  }
  return count;
}

// ─── Click handlers ───────────────────────────────────────────────────────────
function handleClick(r,c){
  if(state.gameOver||state.paused)return;
  if(state.flagged[r][c])return;
  if(state.revealed[r][c]){chordReveal(r,c);return;}
  if(state.firstClick){
    state.firstClick=false;placeMines(r,c);startTimer();state.gameStarted=true;setPlayBtn(true);startBGM();
    unlockAch('firstSteps');
  }
  if(state.board[r][c]===-1){
    state.revealed[r][c]=true;state.mineHits++;
    const tile=getTileEl(r,c);if(tile){tile.classList.remove('hidden');tile.classList.add('mine-hit');tile.textContent='💣';}
    playMine();playLoseLife();
    state.lives--;updateLivesUI();
    setMascotMood('scared',1300);
    setTurtleMood('scared',1500);
    // Heart break animation
    const lv=document.getElementById('livesDisplay');if(lv)lv.classList.add('break');setTimeout(()=>lv&&lv.classList.remove('break'),500);
    if(state.lives<=0){endGame(false);}
    else{
      const grid=document.getElementById('gameGrid');grid.classList.add('shake');setTimeout(()=>grid.classList.remove('shake'),500);
      showToast(t('loseLife').replace('{n}',state.lives));
      setSpeech(pick(t('warn')));
      state.combo=0; // reset combo on mine hit
    }
  } else {
    playReveal();
    const count=floodReveal(r,c);
    triggerCombo(count,r,c);
    checkWin();updateUI();updateSpeech();updateStars();
  }
}

function chordReveal(r,c){
  if(!state.revealed[r][c]||state.board[r][c]<=0)return;
  let fc=0;const nbrs=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;if(nr<0||nr>=state.size||nc<0||nc>=state.size)continue;
    if(state.flagged[nr][nc])fc++;else if(!state.revealed[nr][nc])nbrs.push([nr,nc]);
  }
  if(fc===state.board[r][c]){
    nbrs.forEach(([nr,nc])=>{
      if(!state.revealed[nr][nc]&&!state.flagged[nr][nc]){
        if(state.board[nr][nc]===-1){
          state.revealed[nr][nc]=true;state.mineHits++;state.lives--;
          const tile=getTileEl(nr,nc);if(tile){tile.classList.remove('hidden');tile.classList.add('mine-hit');tile.textContent='💣';}
          playMine();updateLivesUI();setMascotMood('scared',1300);setTurtleMood('scared',1500);
          if(state.lives<=0)endGame(false);
        }else{const cnt=floodReveal(nr,nc);triggerCombo(cnt,nr,nc);}
      }
    });
    if(!state.gameOver){playReveal();checkWin();updateUI();updateSpeech();updateStars();}
  }
}

function toggleFlag(r,c){
  if(state.gameOver||state.paused||state.revealed[r][c]||!state.gameStarted)return;
  state.flagged[r][c]=!state.flagged[r][c];state.flagsLeft+=state.flagged[r][c]?-1:1;playFlag();
  const tile=getTileEl(r,c);if(tile){tile.classList.toggle('flagged',state.flagged[r][c]);tile.classList.toggle('hidden',!state.flagged[r][c]);renderTile(tile,r,c);
    if(state.flagged[r][c]){tile.classList.remove('sp-star','sp-chest','sp-boost');}
    else if(state.specials[r]&&state.specials[r][c]){tile.classList.add(`sp-${state.specials[r][c]}`);}}
  updateUI();
}

// ─── Win / Lose ───────────────────────────────────────────────────────────────
function checkWin(){if(state.revealedSafe>=state.totalSafe)endGame(true);}
function endGame(won){
  state.gameOver=true;state.won=won;
  clearInterval(state.timerInterval);clearTimeout(state.comboTimer);state.timerInterval=null;stopBGM();
  clearTimeout(idleTimer);
  if(won){
    const timeBon=Math.max(0,500-state.elapsed*2);const lifeBon=state.lives*80;
    state.score+=timeBon+state.mines*20+lifeBon;
    playWin();spawnConfetti();setSpeech(t('winTitle'));updateStars();
    setMascotMood('happy');
    setTurtleMood('happy');
    const stars=getStarCount();
    if(typeof state.level==='number'&&state.level<10){setUnlockedLevel(state.level+1);state._justUnlocked=state.level+1;}
    if(state._dailyMode){localStorage.setItem(getDailyKey()+'-done','1');unlockAch('dailyHero');}
    setTimeout(()=>{checkAchievements(true,stars);showOverlay(true);},800);
  }else{
    revealAllMines();setSpeech('😅');
    setMascotMood('cry');
    setTurtleMood('scared',3000);
    checkAchievements(false,0);
    setTimeout(()=>showOverlay(false),1200);
  }
  updateUI();setPlayBtn(false);
}
function revealAllMines(){
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)
    if(state.board[r][c]===-1&&!state.revealed[r][c]){const tile=getTileEl(r,c);if(tile){tile.classList.remove('hidden','flagged');tile.classList.add('mine-show');tile.textContent='💣';}}
}
function showOverlay(won){
  const stars=getStarCount();
  const isNew=won&&setBest(state.level,state.score);
  if(won)setStars(state.level,stars);
  document.getElementById('overlayEmoji').textContent=won?'🎉':'😅';
  document.getElementById('overlayTitle').textContent=won?t('winTitle'):t('loseTitle');
  document.getElementById('overlayTitle').style.color=won?'#16A34A':'#DC2626';
  document.getElementById('overlaySub').textContent=won?t('winSub'):t('loseSub');
  document.getElementById('overlayStars').textContent=won?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'💥💥💥';
  document.getElementById('overlayScore').textContent=t('scoreLabel')+state.score.toLocaleString();
  document.getElementById('overlayBest').textContent=isNew?t('newBest'):(won?t('bestLabel')+getBest(state.level).toLocaleString():'');
  document.getElementById('overlayBtn').textContent=won?t('mapBtn'):t('playAgain');
  document.getElementById('overlay').classList.add('show');
  if(won)renderBestBar();
}

// ─── Stars ────────────────────────────────────────────────────────────────────
function getStarCount(){
  const pct=state.revealedSafe/state.totalSafe;
  if(pct>=1){if(state.elapsed<60&&state.mineHits===0)return 3;if(state.elapsed<180&&state.mineHits<=1)return 2;return 1;}
  if(pct>=.7)return 1;return 0;
}
function updateStars(){const s=getStarCount();['star1','star2','star3'].forEach((id,i)=>document.getElementById(id).classList.toggle('dim',i>=s));}

// ─── Timer ────────────────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{if(!state.paused){state.elapsed++;updateTimerDisplay();}},1000);
}
function updateTimerDisplay(){const m=Math.floor(state.elapsed/60).toString().padStart(2,'0');const s=(state.elapsed%60).toString().padStart(2,'0');document.getElementById('timerDisplay').textContent=`${m}:${s}`;}

// ─── Power-ups ────────────────────────────────────────────────────────────────
const safePool=()=>{const a=[];for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)if(!state.revealed[r][c]&&!state.flagged[r][c]&&state.board[r][c]!==-1)a.push([r,c]);return a;};
function useHint(){
  if(state.hints<=0||state.gameOver||!state.gameStarted)return;
  const pool=safePool();if(!pool.length)return;
  state.hints--;playHintSnd();
  const[r,c]=pool[Math.floor(Math.random()*pool.length)],tile=getTileEl(r,c);
  if(tile){tile.style.outline='3px solid gold';tile.style.outlineOffset='3px';setTimeout(()=>{tile.style.outline='';tile.style.outlineOffset='';},2200);}
  showToast(t('hintToast'));updatePowerupUI();
}
function usePeek(){
  if(state.peeks<=0||state.gameOver||!state.gameStarted)return;
  state.peeks--;playHintSnd();
  const els=[];
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++)
    if(!state.revealed[r][c]&&!state.flagged[r][c]&&state.board[r][c]===-1){const tile=getTileEl(r,c);if(tile){tile.classList.add('peeking');tile.textContent='💣';els.push({tile,r,c});}}
  setTimeout(()=>{els.forEach(({tile,r,c})=>{tile.classList.remove('peeking');tile.textContent='';renderTile(tile,r,c);});},2000);
  showToast(t('peekToast'));updatePowerupUI();
}
function useSafeDig(){
  if(state.safeDigs<=0||state.gameOver||!state.gameStarted)return;
  const pool=safePool();if(!pool.length)return;
  state.safeDigs--;playReveal();
  const[r,c]=pool[Math.floor(Math.random()*pool.length)];
  const cnt=floodReveal(r,c);triggerCombo(cnt,r,c);
  checkWin();updateUI();updateSpeech();updateStars();
  showToast(t('safeDigToast'));updatePowerupUI();
}
function updatePowerupUI(){
  document.getElementById('hintCount').textContent=state.hints;
  document.getElementById('peekCount').textContent=state.peeks;
  document.getElementById('safedigCount').textContent=state.safeDigs;
  document.getElementById('btnHint').disabled=state.hints===0;
  document.getElementById('btnPeek').disabled=state.peeks===0;
  document.getElementById('btnSafeDig').disabled=state.safeDigs===0;
}

// ─── Level / Play / Reset ─────────────────────────────────────────────────────
function changeLevel(v){state.level=parseInt(v);state.hints=3;state.peeks=3;state.safeDigs=3;initGame();}
function togglePlay(){if(!state.gameStarted||state.gameOver)return;state.paused=!state.paused;setPlayBtn(!state.paused);if(state.paused)stopBGM();else startBGM();}
function setPlayBtn(playing){document.getElementById('playBtnIcon').textContent=state.paused?'▶':(playing?'⏸':'▶');document.getElementById('playBtnText').textContent=state.paused?t('resume'):(playing?t('pause'):t('play'));}
function resetGame(){state.hints=3;state.peeks=3;state.safeDigs=3;initGame();document.getElementById('overlay').classList.remove('show');}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('gameGrid');
  grid.style.gridTemplateColumns=`repeat(${state.size},var(--tile-size))`;grid.innerHTML='';
  for(let r=0;r<state.size;r++)for(let c=0;c<state.size;c++){
    const tile=document.createElement('div');tile.className='tile hidden';tile.dataset.r=r;tile.dataset.c=c;
    tile.addEventListener('click',()=>handleClick(r,c));
    tile.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(r,c);});
    let pt=null;
    tile.addEventListener('touchstart',()=>{pt=setTimeout(()=>{tile.classList.add('pressing');setTimeout(()=>tile.classList.remove('pressing'),500);toggleFlag(r,c);pt=null;},500);},{passive:true});
    tile.addEventListener('touchend',()=>{if(pt){clearTimeout(pt);pt=null;}});
    tile.addEventListener('touchmove',()=>{if(pt){clearTimeout(pt);pt=null;}});
    grid.appendChild(tile);
  }
}
function renderTile(tile,r,c){
  tile.className='tile';tile.textContent='';
  if(state.revealed[r][c]){tile.classList.add('revealed');if(state.board[r][c]===-1)tile.textContent='💣';else if(state.board[r][c]>0){tile.textContent=state.board[r][c];tile.classList.add(`n${state.board[r][c]}`);}}
  else if(state.flagged[r][c]){tile.classList.add('flagged');tile.textContent='🚩';}
  else tile.classList.add('hidden');
}
const getTileEl=(r,c)=>document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
function updateUI(){document.getElementById('scoreDisplay').textContent=state.score.toLocaleString();document.getElementById('flagCount').textContent=state.flagsLeft;updateTimerDisplay();}

// ─── Speech ───────────────────────────────────────────────────────────────────
function setSpeech(text){document.getElementById('speechBubble').innerHTML=text.replace(/\n/g,'<br>');}
function updateSpeech(){const pct=state.revealedSafe/state.totalSafe;setSpeech(pick(pct>.7?t('warn'):t('good')));}

// ─── Mascot moods ─────────────────────────────────────────────────────────────
function setMascotMood(mood,duration){
  const wrap=document.querySelector('.mascot-wrap');if(!wrap)return;
  wrap.classList.remove('mascot--happy','mascot--scared','mascot--cheer','mascot--cry');
  if(mood!=='default')wrap.classList.add(`mascot--${mood}`);
  mascotMood=mood;
  // Expression overlay emoji
  const old=wrap.querySelector('.mascot-expr');if(old)old.remove();
  const exprMap={happy:'😊',scared:'😱',cheer:'💪',cry:'😢'};
  if(exprMap[mood]){
    const expr=document.createElement('div');expr.className='mascot-expr';expr.textContent=exprMap[mood];
    wrap.appendChild(expr);setTimeout(()=>expr.remove(),1300);
  }
  // Star particles on happy / cheer
  if(mood==='happy'||mood==='cheer'){
    for(let i=0;i<4;i++){
      const p=document.createElement('div');p.className='cat-star-particle';p.textContent='⭐';
      const angle=Math.random()*Math.PI*2,dist=38+Math.random()*28;
      p.style.cssText=`left:50%;top:35%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-18}px;animation-delay:${i*0.1}s`;
      wrap.appendChild(p);setTimeout(()=>p.remove(),950);
    }
  }
  if(duration)setTimeout(()=>{if(mascotMood===mood)setMascotMood('default');},duration);
}

function setTurtleMood(mood,duration){
  const wrap=document.querySelector('.turtle-wrap');if(!wrap)return;
  wrap.classList.remove('turtle--scared','turtle--happy');
  if(mood!=='default')wrap.classList.add(`turtle--${mood}`);
  if(duration)setTimeout(()=>{const w=document.querySelector('.turtle-wrap');if(w){w.classList.remove(`turtle--${mood}`);}},duration);
}

function showCatPhrase(){
  const phrases=t('catPhrases');
  const text=phrases[catPhraseIdx%phrases.length];catPhraseIdx++;
  const wrap=document.querySelector('.mascot-wrap');if(!wrap)return;
  const old=wrap.querySelector('.click-phrase');if(old)old.remove();
  const el=document.createElement('div');el.className='click-phrase';el.textContent=text;
  wrap.appendChild(el);setTimeout(()=>el.remove(),2600);
}

function resetIdleTimer(){
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{
    if(state.gameStarted&&!state.gameOver&&!state.paused){
      showCatPhrase();
      if(mascotMood==='default')setMascotMood('cheer',900);
    }
    resetIdleTimer();
  },30000);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}

// ─── Confetti ─────────────────────────────────────────────────────────────────
function spawnConfetti(){
  const colors=['#F472B6','#FCD34D','#6EE7B7','#93C5FD','#C084FC','#FB923C','#34D399','#F87171'];
  for(let i=0;i<70;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-delay:${Math.random()*1.8}s;animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'2px'}`;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);}
}

// ─── Turtle rotation ──────────────────────────────────────────────────────────
setInterval(()=>{document.getElementById('turtleBubble').textContent=pick(t('turtle'));},4000);

// ─── Boot ─────────────────────────────────────────────────────────────────────
applyLang();
showMapScreen();
// Restore audio button states
document.getElementById('btnMusic').classList.toggle('muted',!musicOn);
document.getElementById('btnSound').classList.toggle('muted',!soundOn);
// First-launch tutorial
if(!localStorage.getItem('sweeper-seen-help')){
  localStorage.setItem('sweeper-seen-help','1');
  setTimeout(openHelp,700);
}

// ─── Service Worker ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
